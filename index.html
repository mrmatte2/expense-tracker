<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utgifter & Räkningar</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F5F0E8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Utgifter">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- ── Auth screen ──────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-inner">
    <h1 class="brand">Utgifter <span>&</span> Räkningar</h1>
    <p class="brand-sub">Mattias & Melissa</p>
    <div id="google-btn"></div>
    <p id="auth-error" class="auth-error"></p>
  </div>
</div>

<!-- ── App ─────────────────────────────────────────────────────────────── -->
<div id="app" hidden>

  <header class="app-header">
    <h1 class="brand-sm">Utgifter <span>&</span> Räkningar</h1>
    <div class="header-right">
      <span id="header-user"></span>
      <button id="signout-btn" class="btn-signout" title="Sign out">↩</button>
    </div>
  </header>

  <main>

    <!-- Add -->
    <section id="page-add" class="page active">

      <!-- Setup (collapsible) -->
      <div id="setup-open" class="card setup-card">
        <h2 class="section-label">⚙ Google Sheets Setup</h2>
        <div class="field">
          <label for="web-app-url">Web App URL</label>
          <input type="url" id="web-app-url" placeholder="https://script.google.com/macros/s/...">
        </div>
        <div class="row-end">
          <button id="save-setup-btn" class="btn-secondary">Save & Hide</button>
        </div>
        <p class="hint">Saved locally in your browser.</p>
      </div>
      <div id="setup-closed" class="setup-closed hidden">
        <span class="setup-ok">✓ Sheet configured</span>
        <button id="edit-setup-btn" class="btn-ghost">Edit</button>
      </div>

      <!-- Expense form -->
      <div class="card">

        <div class="field">
          <label>Budget</label>
          <div class="seg-group" id="budget-toggle">
            <button class="seg-btn active" data-value="joint">Joint</button>
            <button class="seg-btn" data-value="mattias">Mattias</button>
            <button class="seg-btn" data-value="melissa">Melissa</button>
          </div>
        </div>

        <div class="field" id="payer-field">
          <label>Who paid?</label>
          <div class="seg-group" id="payer-toggle">
            <button class="seg-btn" data-value="Mattias">Mattias</button>
            <button class="seg-btn" data-value="Melissa">Melissa</button>
          </div>
        </div>

        <div class="field">
          <label for="item">Item</label>
          <input type="text" id="item" placeholder="e.g. ICA Maxi groceries" autocomplete="off">
        </div>

        <div class="field">
          <label for="amount">Amount (kr)</label>
          <input type="number" id="amount" placeholder="0" inputmode="decimal" min="0">
        </div>

        <div class="field">
          <label for="category">Category</label>
          <select id="category">
            <option value="">Select category…</option>
            <option>Bills</option>
            <option>Business</option>
            <option>Entertainment</option>
            <option>Food & Drink</option>
            <option>Gifts</option>
            <option>Groceries</option>
            <option>Health & Wellbeing</option>
            <option>Investment</option>
            <option>Other</option>
            <option>Shopping</option>
            <option>Subscriptions</option>
            <option>Transport</option>
            <option>Travel</option>
          </select>
        </div>

        <div class="field">
          <label for="purchase-date">Date</label>
          <input type="date" id="purchase-date">
        </div>

        <button id="submit-btn" class="btn-primary">Add Expense</button>
      </div>

      <!-- Recent -->
      <div class="list-section">
        <h2 class="section-label">Added this session</h2>
        <div id="recent-list"></div>
      </div>

    </section>

    <!-- History -->
    <section id="page-history" class="page">
      <div class="page-toolbar">
        <div class="seg-group" id="history-budget-toggle">
          <button class="seg-btn active" data-value="joint">Joint</button>
          <button class="seg-btn" data-value="mattias">Mattias</button>
          <button class="seg-btn" data-value="melissa">Melissa</button>
        </div>
        <button id="history-refresh-btn" class="btn-ghost">↻</button>
      </div>
      <div id="history-list"><p class="loading-msg">Select a budget and tap ↻ to load.</p></div>
    </section>

    <!-- Summary -->
    <section id="page-summary" class="page">
      <div class="page-toolbar">
        <h2 class="section-label">Monthly Summary</h2>
        <button id="summary-refresh-btn" class="btn-ghost">↻ Refresh</button>
      </div>
      <div id="summary-content"><p class="loading-msg">Tap refresh to load summary.</p></div>
    </section>

  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="add">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Add
    </button>
    <button class="nav-btn" data-page="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      History
    </button>
    <button class="nav-btn" data-page="summary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/>
      </svg>
      Summary
    </button>
  </nav>

</div>

<!-- ── Confirm modal ────────────────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <p id="modal-message" class="modal-message"></p>
    <div class="modal-actions">
      <button id="modal-cancel" class="btn-secondary">Cancel</button>
      <button id="modal-confirm" class="btn-primary">Confirm</button>
    </div>
  </div>
</div>

<!-- ── Toast ────────────────────────────────────────────────────────────── -->
<div id="toast" class="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
